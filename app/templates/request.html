{% extends 'base.html' %}
{% block content %}
<h4 class="mb-4">Frequestly Used Requests</h4>
<form method="POST" class="d-flex align-items-end">
    <div class="me-2">
        <label for="request_type" class="form-label">Request Type:</label>
        <select id="request_type" name="request_type" class="form-select form-select-sm">
            {% for request_type, request_data in request_types.items() %}
            <option value="{{ request_type }}" {% if request_type == selected_request_type %}selected{% endif %}>{{ request_data.name }}</option>
            {% endfor %}
        </select>

    </div>

    <div>
        <button type="submit" class="btn btn-primary btn-sm">Generate Request</button>
    </div>

</form>

{% if request_template %}
<h5 class="mt-3">Request Template:</h5>

<button class="btn btn-secondary" onclick="copyCode('response')">Copy</button>
<pre id="response" style="background:#f4f4f4; border-radius:5px;">
{{ request_template | e }}
</pre>

{% endif %}


{% endblock %}
