<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>

</head>

<body>
    <header>
        <h1>Task Manager</h1>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                                href="{{ url_for('home_bp.index') }}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'address' %}active{% endif %}"
                                href="{{ url_for('address_bp.address') }}">Generate Address</a>
                        </li>
                   
                        <li class="nav-item dropdown">
                              <a class="nav-link {% if request.endpoint == 'request_bp.get_request' %}active{% endif %}"
                                    href="{{ url_for('request_bp.get_request') }}">Frequently Used Requests</a>
                            
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

    </header>
    <main>
                <div id="notification" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background-color:#4CAF50; color:white; padding:10px; border-radius:5px; box-shadow:0px 4px 6px rgba(0,0,0,0.2);"></div>


        {% block content %}
        {% endblock %}

    </main>
</body>

</html>
