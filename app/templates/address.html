{% extends 'base.html' %}
{% block content %}
<h4 class="mb-4">Generate Random Address</h4>
<form method="POST" class="d-flex align-items-end">
    <div class="me-2">
        <label for="state" class="form-label">State:</label>
        <select id="state" name="state" class="form-select form-select-sm">
            {% for state in states %}
            <option value="{{ state }}" {% if state == selected_state %}selected{% endif %}>{{ state }}</option>
            {% endfor %}
        </select>

    </div>

    <div>
        <button type="submit" class="btn btn-primary btn-sm">Generate Address</button>
    </div>

</form>

{% if address %}
<h5 class="mt-3">Random Address: {{ address }}</h5>
{% endif %}


{% endblock %}
